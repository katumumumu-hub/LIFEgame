<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LIFE - Age 5</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F0F3F7;
            --text: #2D3436;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 414px;
            height: 100%;
            max-height: 896px;
            background: var(--card);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* セットアップ画面 */
        #setup-overlay {
            position: absolute; inset: 0; background: var(--primary); color: white;
            z-index: 100; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 40px; text-align: center;
        }

        input, select { width: 80%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; }

        /* ヘッダー */
        #header { background: var(--primary); color: white; padding: 15px 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .user-info { font-size: 0.85em; font-weight: bold; }
        .age-detail { font-size: 0.9em; margin-top: 5px; background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 5px; display: inline-block; }
        .date-badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; font-weight: bold; }

        /* ステータス */
        #status-bar {
            display: grid; grid-template-columns: repeat(5, 1fr);
            background: #FFF5F5; padding: 10px 0; font-size: 0.7em; text-align: center;
        }
        .stat-item b { display: block; font-size: 1.2em; color: var(--primary); }

        /* メイン・アクション選択エリア */
        #main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .section-title { font-weight: bold; color: #666; margin-bottom: 10px; font-size: 0.9em; }

        .category-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn {
            padding: 15px 5px; border: 2px solid #eee; border-radius: 15px; background: white;
            cursor: pointer; font-weight: bold; color: #666; transition: 0.2s;
        }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF5F5; }

        #sub-action-list { display: flex; flex-direction: column; gap: 10px; }
        .sub-btn {
            padding: 15px; border: none; border-radius: 12px; background: #f8f9fa;
            text-align: left; cursor: pointer; transition: 0.2s; border-left: 5px solid transparent;
        }
        .sub-btn:hover { background: #eef2f7; border-left-color: var(--secondary); }
        .sub-btn b { display: block; color: #333; }
        .sub-btn span { font-size: 0.8em; color: #888; }

        /* ナビ */
        #nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #eee; }
        .nav-item { padding: 15px; border: none; background: none; cursor: pointer; font-size: 0.8em; color: #666; }

        /* モーダル */
        .modal { position: absolute; inset: 0; background: white; z-index: 50; display: none; flex-direction: column; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-overlay">
        <h1>THE LIFE</h1>
        <input type="text" id="input-name" placeholder="なまえ" maxlength="10">
        <select id="input-gender">
            <option value="おとこのこ">おとこのこ</option>
            <option value="おんなのこ">おんなのこ</option>
        </select>
        <button onclick="startGame()" style="margin-top:20px; padding:15px 40px; border-radius:30px; border:none; background:white; color:var(--primary); font-weight:bold;">はじめる</button>
    </div>

    <div id="header">
        <div class="header-top">
            <div class="user-info">
                <span id="display-name">---</span> (<span id="display-gender">---</span>)
            </div>
            <div class="date-badge" id="display-date">4月1日(水) AM</div>
        </div>
        <div class="age-detail" id="display-age">5歳 0ヶ月 1週 1日</div>
    </div>

    <div id="status-bar">
        <div class="stat-item">体<b><span id="st-hp">10</span></b></div>
        <div class="stat-item) ">知<b><span id="st-int">10</span></b></div>
        <div class="stat-item">感<b><span id="st-sen">10</span></b></div>
        <div class="stat-item">社<b><span id="st-soc">10</span></b></div>
        <div class="stat-item">心<b><span id="st-mnt">10</span></b></div>
    </div>

    <div id="main-content">
        <div class="section-title">なにをする？</div>
        <div class="category-grid">
            <button class="cat-btn active" onclick="selectCat('study', this)">えんきょう</button>
            <button class="cat-btn" onclick="selectCat('play', this)">あそぶ</button>
            <button class="cat-btn" onclick="selectCat('rest', this)">やすむ</button>
        </div>
        <div id="sub-action-list"></div>
    </div>

    <div id="nav-bar">
        <button class="nav-item" onclick="showModal('calendar-modal')">📅 予定</button>
        <button class="nav-item" onclick="showModal('log-modal')">📜 履歴</button>
        <button class="nav-item" onclick="showModal('help-modal')">⚙️ 設定</button>
    </div>

    <div id="calendar-modal" class="modal"><div class="modal-header"><h3>4月の予定</h3><button onclick="closeModal()">×</button></div><div id="calendar-list" style="overflow-y:auto"></div></div>
    <div id="log-modal" class="modal"><div class="modal-header"><h3>履歴</h3><button onclick="closeModal()">×</button></div><div id="log-list" style="overflow-y:auto"></div></div>
</div>

<script>
let state = {
    name: "", gender: "", day: 1, isPM: false,
    params: { hp: 10, int: 10, sen: 10, soc: 10, mnt: 10 },
    hidden: { logic: 0, art: 0, social: 0, health: 0, patience: 0 },
    logs: []
};

const weekDays = ["日", "月", "火", "水", "木", "金", "土"];
const calendarEvents = { 1: "🎂 誕生日", 5: "🌸 入園式", 8: "遠足", 15: "検診", 20: "絵画展", 29: "祝日" };

const actions = {
    study: {
        title: "べんきょう（知力・精神がのびやすい）",
        effect: { int: 2, mnt: 1, hp: -1 },
        subs: [
            { l: "ひらがな・カタカナ", h: { logic: 2 }, d: "言葉の仕組みを理解しようとする。" },
            { l: "かずの かぞえっこ", h: { logic: 2 }, d: "論理的な思考の基礎が作られる。" },
            { l: "えいごの おうた", h: { art: 1, social: 1 }, d: "未知の音に対する好奇心が育つ。" },
            { l: "ずかんを よむ", h: { logic: 1, patience: 1 }, d: "世界のなりたちを深く観察する。" },
            { l: "めいろ・パズル", h: { logic: 2, patience: 1 }, d: "粘り強く正解を探す癖がつく。" }
        ]
    },
    play: {
        title: "あそぶ（体力・感性がのびやすい）",
        effect: { hp: 2, sen: 2, soc: 1 },
        subs: [
            { l: "おりがみ・工作", h: { art: 2, patience: 1 }, d: "指先の器用さと創造性が磨かれる。" },
            { l: "ぬりえ・おえかき", h: { art: 2 }, d: "色彩感覚と表現力が豊かになる。" },
            { l: "おままごと", h: { social: 2, logic: 1 }, d: "社会の役割分担をシミュレートする。" },
            { l: "おそとで かけっこ", h: { health: 2 }, d: "基礎体力が向上し、活発な性格に。" },
            { l: "つみき・ブロック", h: { art: 1, logic: 2 }, d: "空間把握能力が密かに高まる。" }
        ]
    },
    rest: {
        title: "やすむ（体力が大きく回復する）",
        effect: { hp: 4, mnt: 2 },
        subs: [
            { l: "ぐっすり おひるね", h: { health: 2 }, d: "成長ホルモンが分泌され、体が安定する。" },
            { l: "ぼーっと 空をみる", h: { art: 1, patience: 1 }, d: "何もしない時間は、内省を深める。" },
            { l: "おやつを たべる", h: { health: -1, social: 1 }, d: "小さな幸福が、精神の安定をもたらす。" },
            { l: "ママに 甘える", h: { social: 1, patience: -1 }, d: "愛着形成。依存と安心のバランス。" },
            { l: "おもちゃの おかたづけ", h: { patience: 2, logic: 1 }, d: "秩序を守る習慣が、将来の自立を助ける。" }
        ]
    }
};

function startGame() {
    state.name = document.getElementById('input-name').value || "ななし";
    state.gender = document.getElementById('input-gender').value;
    document.getElementById('display-name').innerText = state.name;
    document.getElementById('display-gender').innerText = state.gender;
    document.getElementById('setup-overlay').style.display = "none";
    initCalendar();
    selectCat('study', document.querySelector('.cat-btn'));
    render();
}

function render() {
    // ステータス更新
    for (let k in state.params) document.getElementById('st-'+k).innerText = Math.floor(state.params[k]);
    
    // 日付・曜日計算 (4/1を水曜とする)
    const currentWeekDay = weekDays[(state.day + 2) % 7];
    document.getElementById('display-date').innerText = `4月${state.day}日(${currentWeekDay}) ${state.isPM?'PM':'AM'}`;
    
    // 年齢詳細計算
    const weeks = Math.floor((state.day - 1) / 7) + 1;
    const daysInWeek = ((state.day - 1) % 7) + 1;
    document.getElementById('display-age').innerText = `5歳 0ヶ月 ${weeks}週 ${daysInWeek}日`;
}

let currentCat = 'study';
function selectCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const list = document.getElementById('sub-action-list');
    list.innerHTML = actions[cat].subs.map((s, i) => `
        <button class="sub-btn" onclick="doAction(${i})">
            <b>${s.l}</b>
            <span>${actions[cat].title}</span>
        </button>
    `).join('');
}

function doAction(idx) {
    const main = actions[currentCat];
    const sub = main.subs[idx];

    // パラメータ適用 (5歳成長2倍)
    for(let k in main.effect) state.params[k] += main.effect[k] * 2;
    for(let k in sub.h) state.hidden[k] += sub.h[k];

    // ログ保存
    state.logs.unshift({ date: document.getElementById('display-date').innerText, act: sub.l, nar: sub.d });
    updateLogUI();

    // 進行
    if(state.isPM) { state.day++; state.isPM = false; }
    else { state.isPM = true; }

    if(state.day > 30) { alert("1ヶ月終了！"); location.reload(); }
    else render();
}

function updateLogUI() {
    document.getElementById('log-list').innerHTML = state.logs.map(l => `
        <div style="padding:10px; border-bottom:1px solid #eee">
            <small>${l.date}</small><br><b>${l.act}</b><br><span style="font-size:0.8em; color:#666">${l.nar}</span>
        </div>
    `).join('');
}

function initCalendar() {
    const list = document.getElementById('calendar-list');
    for(let d=1; d<=30; d++){
        const wd = weekDays[(d + 2) % 7];
        list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee">4/${d}(${wd}) - ${calendarEvents[d] || "---"}</div>`;
    }
}

function showModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = "none"); }
</script>
</body>
</html>
