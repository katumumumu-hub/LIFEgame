<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LIFE - Debug Edition</title>
    <style>
        :root {
            --primary: #FF9AA2;
            --primary-dark: #FF7B84;
            --bg: #FFFDF9;
            --text: #5D514E;
            --card: #FFFFFF;
            --radius: 25px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 414px; height: 100%;
            background: var(--card); display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ヘッダー */
        #header { background: var(--primary); color: white; padding: 12px 20px; border-radius: 0 0 30px 30px; flex-shrink: 0; }
        .date-badge { background: rgba(255,255,255,0.8); color: var(--primary-dark); padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.85em; float: right; }

        /* ステータスバー */
        #status-bar {
            display: grid; grid-template-columns: repeat(5, 1fr);
            background: #FFF5F5; padding: 10px 5px; margin: 10px 15px;
            border-radius: 15px; border: 1px solid #FFEDEE; flex-shrink: 0;
        }
        .stat-item { text-align: center; font-size: 0.7em; color: #887C79; }
        .stat-item b { display: block; font-size: 1.2em; color: var(--primary-dark); }

        /* プロフィールカード (左:画像 / 右:詳細) */
        #hero-profile-card {
            display: flex; background: #fff; border-radius: 20px;
            border: 2px solid #F1F2F6; margin: 0 15px 10px; height: 160px; overflow: hidden; flex-shrink: 0;
        }
        #hero-visual-area {
            width: 45%; background: #FFF9F9; display: flex; justify-content: center; align-items: flex-end;
            border-right: 1px solid #F1F2F6; padding-bottom: 5px;
        }
        #player-canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        #hero-detail-area { width: 55%; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .hero-name { font-weight: bold; font-size: 1em; color: var(--primary-dark); }
        .hero-info { font-size: 0.75em; color: #887C79; }

        /* ゲージ */
        .gauge-wrap { margin-top: 5px; }
        .gauge-label { font-size: 0.65em; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .gauge-bg { height: 6px; background: #EEE; border-radius: 3px; overflow: hidden; }
        .gauge-fill { height: 100%; width: 0%; transition: width 0.3s; }
        .fill-fatigue { background: #FFB347; }
        .fill-cond { background: #77DD77; }

        /* メインコンテンツ */
        #main-content { flex: 1; padding: 0 15px; overflow-y: auto; }
        .section-title { font-weight: bold; text-align: center; margin: 15px 0 10px; color: #A89B98; font-size: 0.9em; }

        #category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .cat-btn {
            padding: 10px 2px; border: 2px solid #F1F2F6; border-radius: 15px; background: white;
            cursor: pointer; font-weight: bold; color: #887C79; font-size: 0.8em;
        }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF5F5; }

        #sub-action-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .sub-btn { padding: 15px; border: 1px solid #EEE; border-radius: 12px; background: #fff; text-align: left; cursor: pointer; }

        /* ナビ */
        #nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #EEE; background: #fff; flex-shrink: 0; }
        .nav-item { padding: 15px; border: none; background: none; font-size: 0.85em; color: #9B918F; font-weight: bold; cursor: pointer; }

        /* 復活させた隠しパラメータ用モーダル */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { width: 100%; height: 85%; background: white; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; padding: 25px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .debug-scroll { flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.8em; }
        .debug-section { margin-bottom: 15px; }
        .debug-section h4 { margin: 10px 0 5px; color: #FF4B5C; border-bottom: 1px solid #FFE6E6; padding-bottom: 2px; }
        .debug-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px inset #FAFAFA; }

        #setup-overlay { position: absolute; inset: 0; background: var(--primary); color: white; z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="debug-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">🛠 隠しパラメータ確認</h3>
                <button onclick="toggleDebug(false)" style="border:none; background:#F0F0F0; padding:8px 15px; border-radius:10px; font-weight:bold;">閉じる</button>
            </div>
            <div class="debug-scroll" id="debug-viewer"></div>
        </div>
    </div>

    <div id="setup-overlay">
        <h2 style="margin-bottom:20px;">THE LIFE</h2>
        <input type="text" id="input-name" placeholder="なまえ" style="width:100%; padding:15px; border-radius:15px; border:none; margin-bottom:10px;">
        <select id="input-gender" style="width:100%; padding:15px; border-radius:15px; border:none; margin-bottom:20px;">
            <option value="boy">おとこのこ 👦</option>
            <option value="girl">おんなのこ 👧</option>
        </select>
        <button onclick="startGame()" style="width:100%; padding:18px; border-radius:30px; border:none; background:white; color:var(--primary); font-weight:bold;">はじめる</button>
    </div>

    <div id="header">
        <span id="display-date-top" class="date-badge">---</span>
        <div style="font-weight:bold;">THE LIFE</div>
    </div>

    <div id="status-bar">
        <div class="stat-item">体力<b><span id="st-hp">0</span></b></div>
        <div class="stat-item">知力<b><span id="st-int">0</span></b></div>
        <div class="stat-item">感性<b><span id="st-sen">0</span></b></div>
        <div class="stat-item">社交<b><span id="st-soc">0</span></b></div>
        <div class="stat-item">精神<b><span id="st-mnt">0</span></b></div>
    </div>

    <div id="main-content">
        <div id="hero-profile-card">
            <div id="hero-visual-area">
                <canvas id="player-canvas"></canvas>
            </div>
            <div id="hero-detail-area">
                <div class="hero-name" id="display-name">---</div>
                <div class="hero-info" id="display-age">---</div>
                <div class="hero-info" id="display-job">---</div>
                
                <div class="gauge-wrap">
                    <div class="gauge-label"><span>疲労度</span><span id="label-fatigue">0%</span></div>
                    <div class="gauge-bg"><div id="fill-fatigue" class="gauge-fill fill-fatigue"></div></div>
                </div>
                <div class="gauge-wrap">
                    <div class="gauge-label"><span>体調</span><span id="label-cond">100%</span></div>
                    <div class="gauge-bg"><div id="fill-cond" class="gauge-fill fill-cond"></div></div>
                </div>
            </div>
        </div>

        <div class="section-title">✨ きょうは なにをする？ ✨</div>
        <div id="category-grid">
            <button class="cat-btn" id="cat-study" onclick="selectCat('study', this)">📖 べんきょう</button>
            <button class="cat-btn" id="cat-play" onclick="selectCat('play', this)">🧸 あそぶ</button>
            <button class="cat-btn" id="cat-rest" onclick="selectCat('rest', this)">🛌 やすむ</button>
        </div>
        <div id="sub-action-list"></div>
    </div>

    <div id="nav-bar">
        <button class="nav-item">🗓️ よてい</button>
        <button class="nav-item">📖 きろく</button>
        <button class="nav-item" onclick="toggleDebug(true)">⚙️ 設定</button>
    </div>
</div>

<script>
// --- ゲームデータ ---
let state = {
    name: "", gender: "", age: 5, month: 0, week: 1, day: 1, isPM: false,
    params: { hp: 10, int: 10, sen: 10, soc: 10, mnt: 10 },
    fatigue: 0, condition: 100,
    hiddenParams: {
        "【筋肉】": { "pectorals": 10.0, "latissimus": 10.0, "biceps": 5.0, "quadriceps": 15.0, "innerMuscle": 10.0, "flexibility": 50.0 },
        "【学力】": { "linguistic": 10.0, "logical": 10.0, "spatial": 10.0, "workingMemory": 50.0 },
        "【性格】": { "openness": 50.0, "conscientiousness": 50.0, "extraversion": 50.0, "agreeableness": 50.0, "neuroticism": 30.0, "karma": 100.0 },
        "【生活習慣】": { "skinCycle": 28.0, "cleanliness": 80.0, "posture": 100.0 }
    }
};

const actions = {
    study: [
        { label: 'こくご・おんどく', effect: { int: 1.2, mnt: 0.5 }, hidden: "【学力】.linguistic", hVal: 1.5, fatigue: 10 },
        { label: 'さんすう・けいさん', effect: { int: 1.5 }, hidden: "【学力】.logical", hVal: 2.0, fatigue: 12 },
        { label: 'ずかん・じゆうちょう', effect: { int: 0.8, sen: 1.0 }, hidden: "【学力】.spatial", hVal: 1.2, fatigue: 8 }
    ],
    play: [
        { label: 'おそとをはしる', effect: { hp: 2.0, soc: 0.5 }, hidden: "【筋肉】.quadriceps", hVal: 3.0, fatigue: 15 },
        { label: 'おえかき', effect: { sen: 2.0 }, hidden: "【学力】.spatial", hVal: 1.5, fatigue: 5 }
    ],
    rest: [
        { label: 'おひるね', effect: {}, hidden: "【生活習慣】.skinCycle", hVal: -0.1, fatigue: -30 }
    ]
};

// --- コア機能 ---
function startGame() {
    state.name = document.getElementById('input-name').value || "ななし";
    state.gender = document.getElementById('input-gender').value;
    document.getElementById('setup-overlay').style.display = "none";
    selectCat('study', document.getElementById('cat-study'));
    render();
}

function selectCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const list = document.getElementById('sub-action-list');
    list.innerHTML = actions[cat].map((a, i) => `
        <button class="sub-btn" onclick="doAction('${cat}', ${i})"><b>${a.label}</b></button>
    `).join('');
}

function doAction(cat, idx) {
    const a = actions[cat][idx];
    // パラメータ反映
    for(let k in a.effect) state.params[k] += a.effect[k];
    
    // 隠しパラメータ反映
    if(a.hidden) {
        let [sec, key] = a.hidden.split('.');
        state.hiddenParams[sec][key] += a.hVal;
    }

    // 疲労・時間
    state.fatigue = Math.min(100, Math.max(0, state.fatigue + a.fatigue));
    if(state.isPM) {
        state.day++; state.isPM = false;
        if(state.day > 30) { state.day = 1; state.month++; }
        if(state.month >= 12) { state.month = 0; state.age++; }
    } else {
        state.isPM = true;
    }
    render();
}

function render() {
    // 日付・プロフィール
    const wd = ["日", "月", "火", "水", "木", "金", "土"][(state.day + 2) % 7];
    document.getElementById('display-date-top').innerText = `4月${state.day}日(${wd}) ${state.isPM ? 'PM' : 'AM'}`;
    document.getElementById('display-name').innerText = `${state.name} (${state.gender === 'boy' ? 'おとこのこ' : 'おんなのこ'})`;
    document.getElementById('display-age').innerText = `${state.age}歳 ${state.month}ヶ月 1週 ${((state.day-1)%7)+1}日`;
    document.getElementById('display-job').innerText = state.age < 6 ? "幼稚園" : `小学校 ${state.age-5}年生`;

    // ゲージ
    document.getElementById('fill-fatigue').style.width = state.fatigue + "%";
    document.getElementById('label-fatigue').innerText = state.fatigue + "%";
    document.getElementById('fill-cond').style.width = state.condition + "%";

    // 表ステータス
    for(let k in state.params) {
        document.getElementById('st-'+k).innerText = Math.floor(state.params[k]);
    }

    drawHero();
}

function drawHero() {
    const canvas = document.getElementById('player-canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    // ユーザー提供のファイル名に合わせる
    img.src = state.gender === 'boy' ? '画像1.png' : '画像2.png';
    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img, 0, 0);
    };
}

// 復活させたデバッグ機能
function toggleDebug(show) {
    const modal = document.getElementById('debug-modal');
    modal.style.display = show ? "flex" : "none";
    if(show) {
        let html = "";
        for(let sec in state.hiddenParams) {
            html += `<div class="debug-section"><h4>${sec}</h4>`;
            for(let p in state.hiddenParams[sec]) {
                html += `<div class="debug-row"><span>${p}</span><b>${state.hiddenParams[sec][p].toFixed(2)}</b></div>`;
            }
            html += `</div>`;
        }
        document.getElementById('debug-viewer').innerHTML = html;
    }
}
</script>
</body>
</html>
