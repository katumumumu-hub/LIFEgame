<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>植物図鑑アプリ - 時間連動版</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      text-align: center;
      background-color: #f0f2f0;
      margin: 0;
      padding: 0;
      color: #333;
    }
    #app-container {
      max-width: 400px;
      margin: 0 auto;
      background-color: white;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      padding: 20px;
      box-sizing: border-box;
    }

    /* 時間表示エリア */
    .time-display {
      background-color: #333;
      color: #00ff00;
      font-family: monospace;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }
    .info-text {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 5px;
    }

    /* 育成エリア */
    #pot-area {
      height: 220px;
      background: linear-gradient(to bottom, #eef7ee, #dceddc);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      border: 2px dashed #ccc;
    }
    #plant-image {
      max-width: 70%;
      max-height: 70%;
    }

    /* ステータス表示 */
    .status-panel {
      background-color: #f9f9f9;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: left;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 5px 0;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 5px 0;
      font-weight: bold;
      width: 100%;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    #btn-water { background-color: #2196F3; color: white; }
    #btn-plant { background-color: #4CAF50; color: white; }
    #btn-plant:disabled { background-color: #ccc; }

    #encyclopedia {
      margin-top: 30px;
      border-top: 2px solid #eee;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 10px;
    }
    .grid-item {
      aspect-ratio: 1 / 1;
      background-color: #eee;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
    }
    .grid-item img { width: 90%; }
  </style>
</head>
<body>

<div id="app-container">
  <div class="info-text">現在の現実時間</div>
  <div id="current-time" class="time-display">00:00:00</div>

  <div id="pot-area">
    <img id="plant-image" src="seed.png" alt="植物" style="display: none;">
  </div>

  <div class="status-panel">
    <div class="status-item">
      <span>前回の水やり:</span>
      <span id="last-watered-time">なし</span>
    </div>
    <div class="status-item">
      <span>成長具合:</span>
      <span id="growth-status">-</span>
    </div>
  </div>

  <button id="btn-water" style="display: none;">お水をあげる 💧</button>
  <button id="btn-plant">新しい種を植える 🌱</button>

  <div id="encyclopedia">
    <h3>図鑑</h3>
    <div class="grid" id="book-grid"></div>
  </div>
</div>

<script>
  // --- データ定義 ---
  const plant_master = [
    { id: 1, name: "朝のアサガオ", image: "plant_01.png", condition: { preferred_time: "morning" } },
    { id: 2, name: "サボテン", image: "plant_02.png", condition: { preferred_time: "day" } },
    { id: 3, name: "ツキミソウ", image: "plant_03.png", condition: { preferred_time: "night" } }
  ];

  let saveData = JSON.parse(localStorage.getItem('plantAppSave_v2')) || {
    active_pot: { is_occupied: false, last_watered_at: null, total_water_count: 0, time_stats: { morning: 0, day: 0, night: 0 } },
    encyclopedia: { unlocked_plant_ids: [] }
  };

  // --- 要素取得 ---
  const elCurrentTime = document.getElementById('current-time');
  const elLastWatered = document.getElementById('last-watered-time');
  const elGrowth = document.getElementById('growth-status');
  const elImage = document.getElementById('plant-image');
  const btnWater = document.getElementById('btn-water');
  const btnPlant = document.getElementById('btn-plant');
  const bookGrid = document.getElementById('book-grid');

  // --- 機能：時計の更新 ---
  function updateClock() {
    const now = new Date();
    elCurrentTime.innerText = now.toLocaleTimeString('ja-JP', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- 機能：日付のフォーマット ---
  function formatTimestamp(ts) {
    if (!ts) return "なし";
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // --- 機能：UI更新 ---
  function updateUI() {
    const pot = saveData.active_pot;
    if (pot.is_occupied) {
      elImage.style.display = "block";
      elImage.src = "seed.png";
      btnWater.style.display = "block";
      btnPlant.disabled = true;
      elLastWatered.innerText = formatTimestamp(pot.last_watered_at);
      elGrowth.innerText = `水やり ${pot.total_water_count} / 3回`;
    } else {
      elImage.style.display = "none";
      btnWater.style.display = "none";
      btnPlant.disabled = false;
      elLastWatered.innerText = "なし";
      elGrowth.innerText = "種を待っています";
    }
    drawEncyclopedia();
    localStorage.setItem('plantAppSave_v2', JSON.stringify(saveData));
  }

  // --- イベント：種を植える ---
  btnPlant.addEventListener('click', () => {
    saveData.active_pot = {
      is_occupied: true,
      last_watered_at: null,
      total_water_count: 0,
      time_stats: { morning: 0, day: 0, night: 0 }
    };
    updateUI();
  });

  // --- イベント：水やり ---
  btnWater.addEventListener('click', () => {
    const now = new Date();
    const hr = now.getHours();
    
    // 時間帯記録
    if (hr >= 5 && hr < 10) saveData.active_pot.time_stats.morning++;
    else if (hr >= 18 || hr < 5) saveData.active_pot.time_stats.night++;
    else saveData.active_pot.time_stats.day++;

    saveData.active_pot.last_watered_at = Date.now();
    saveData.active_pot.total_water_count++;

    if (saveData.active_pot.total_water_count >= 3) {
      evolve();
    } else {
      updateUI();
    }
  });

  function evolve() {
    const stats = saveData.active_pot.time_stats;
    let type = "day";
    if (stats.morning > stats.day && stats.morning > stats.night) type = "morning";
    if (stats.night > stats.day && stats.night > stats.morning) type = "night";

    const plant = plant_master.find(p => p.condition.preferred_time === type) || plant_master[0];
    
    if (!saveData.encyclopedia.unlocked_plant_ids.includes(plant.id)) {
      saveData.encyclopedia.unlocked_plant_ids.push(plant.id);
    }

    elImage.src = plant.image;
    elGrowth.innerText = `${plant.name} になりました！`;
    saveData.active_pot.is_occupied = false;
    
    setTimeout(() => {
      alert(plant.name + " を図鑑に登録！");
      updateUI();
    }, 500);
  }

  function drawEncyclopedia() {
    bookGrid.innerHTML = "";
    for (let i = 1; i <= 10; i++) {
      const div = document.createElement('div');
      div.className = 'grid-item';
      const id = saveData.encyclopedia.unlocked_plant_ids.find(idx => idx === i);
      if (id) {
        const p = plant_master.find(pm => pm.id === i);
        div.innerHTML = `<img src="${p ? p.image : ''}">`;
      } else {
        div.innerText = "?";
      }
      bookGrid.appendChild(div);
    }
  }

  updateUI();
</script>
</body>
</html>
