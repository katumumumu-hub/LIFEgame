<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LIFE - 修正版エンジン</title>
    <style>
        :root {
            --primary: #FF9AA2;
            --primary-dark: #FF7B84;
            --bg: #FFFDF9;
            --text: #5D514E;
            --card: #FFFFFF;
            --radius: 25px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 414px; height: 100%;
            background: var(--card); display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ヘッダーエリア */
        #header { background: var(--primary); color: white; padding: 20px 20px 30px; border-radius: 0 0 40px 40px; flex-shrink: 0; position: relative; }
        .hero-info-top { display: flex; flex-direction: column; gap: 4px; }
        .hero-name { font-size: 1.2em; font-weight: bold; }
        .date-badge { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); color: var(--primary-dark); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; }
        .age-badge { background: rgba(255,255,255,0.3); display: inline-block; padding: 5px 15px; border-radius: 15px; font-size: 0.85em; font-weight: bold; margin-top: 5px; }

        /* ステータスバー */
        #status-bar {
            display: grid; grid-template-columns: repeat(5, 1fr);
            background: #FFF5F5; padding: 12px 5px; margin: -15px 20px 10px;
            border-radius: 20px; border: 1px solid #FFEDEE; flex-shrink: 0; z-index: 10;
        }
        .stat-item { text-align: center; font-size: 0.7em; color: #887C79; }
        .stat-item b { display: block; font-size: 1.3em; color: var(--primary-dark); margin-top: 2px; }

        /* メインコンテンツ */
        #main-content { flex: 1; padding: 10px 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* イラスト表示エリア (修正: 高さを確保) */
        #visual-card {
            width: 100%; height: 220px; background: #FFF9F9; border-radius: 20px;
            margin-bottom: 15px; display: flex; justify-content: center; align-items: flex-end; overflow: hidden;
            border: 1px solid #FFF0F0;
        }
        #player-canvas { height: 90%; width: auto; object-fit: contain; }

        .section-title { font-weight: bold; text-align: center; margin: 15px 0; color: #A89B98; font-size: 1.1em; letter-spacing: 0.1em; }

        /* カテゴリボタン */
        #category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .cat-btn {
            padding: 12px 5px; border: 2px solid #F1F2F6; border-radius: 15px; background: white;
            cursor: pointer; font-weight: bold; color: #887C79; font-size: 0.85em; transition: 0.2s;
        }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF5F5; }

        /* アクションリスト */
        #sub-action-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 30px; }
        .sub-btn { 
            padding: 16px; border: 1px solid #EEE; border-radius: 15px; background: #fff; 
            text-align: left; cursor: pointer; display: flex; flex-direction: column;
        }
        .sub-btn b { font-size: 0.95em; color: #007AFF; margin-bottom: 4px; }
        .sub-btn span { font-size: 0.7em; color: #999; }

        /* ナビゲーション */
        #nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #EEE; background: #fff; flex-shrink: 0; }
        .nav-item { padding: 15px; border: none; background: none; font-size: 0.85em; color: #9B918F; font-weight: bold; cursor: pointer; }

        /* デバッグモーダル */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { width: 100%; height: 85%; background: white; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; padding: 25px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .debug-scroll { flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.8em; padding-top: 10px; }
        .debug-section { margin-bottom: 20px; }
        .debug-section h4 { margin: 10px 0; color: #FF4B5C; border-bottom: 1px solid #FFE6E6; padding-bottom: 4px; font-size: 0.9em; }
        .debug-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px inset #FAFAFA; }

        /* セットアップ画面 */
        #setup-overlay { position: absolute; inset: 0; background: var(--primary); color: white; z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: none; margin-bottom: 15px; font-size: 1em; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="debug-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0;">🛠 隠しパラメータ確認</h3>
                <button onclick="toggleDebug(false)" style="border:none; background:#F0F0F0; padding:8px 15px; border-radius:10px; font-weight:bold;">閉じる</button>
            </div>
            <div class="debug-scroll" id="debug-viewer"></div>
        </div>
    </div>

    <div id="setup-overlay">
        <h1 style="margin-bottom:10px;">THE LIFE</h1>
        <p style="margin-bottom:30px; opacity:0.9;">人生シミュレーター</p>
        <input type="text" id="input-name" placeholder="なまえをいれてね">
        <select id="input-gender">
            <option value="boy">おとこのこ 👦</option>
            <option value="girl">おんなのこ 👧</option>
        </select>
        <button onclick="startGame()" style="width:100%; padding:18px; border-radius:30px; border:none; background:white; color:var(--primary); font-weight:bold; font-size:1.1em; cursor:pointer;">はじめる</button>
    </div>

    <div id="header">
        <div class="hero-info-top">
            <div class="hero-name" id="display-name">---</div>
            <div class="age-badge" id="display-age">---</div>
        </div>
        <div class="date-badge" id="display-date">---</div>
    </div>

    <div id="status-bar">
        <div class="stat-item">体力<b><span id="st-hp">0</span></b></div>
        <div class="stat-item">知力<b><span id="st-int">0</span></b></div>
        <div class="stat-item">感性<b><span id="st-sen">0</span></b></div>
        <div class="stat-item">社交<b><span id="st-soc">0</span></b></div>
        <div class="stat-item">精神<b><span id="st-mnt">0</span></b></div>
    </div>

    <div id="main-content">
        <div id="visual-card">
            <canvas id="player-canvas"></canvas>
        </div>

        <div class="section-title">✨ きょうは なにをする？ ✨</div>
        
        <div id="category-grid">
            <button class="cat-btn" id="cat-study" onclick="selectCat('study', this)">📖 べんきょう</button>
            <button class="cat-btn" id="cat-play" onclick="selectCat('play', this)">🧸 あそぶ</button>
            <button class="cat-btn" id="cat-rest" onclick="selectCat('rest', this)">🛌 やすむ</button>
        </div>

        <div id="sub-action-list"></div>
    </div>

    <div id="nav-bar">
        <button class="nav-item">🗓️ よてい</button>
        <button class="nav-item">📖 きろく</button>
        <button class="nav-item" onclick="toggleDebug(true)">⚙️ せってい</button>
    </div>
</div>

<script>
// ==========================================
// 1. データ定義
// ==========================================
let state = {
    name: "", gender: "", age: 5, month: 0, week: 1, day: 1, isPM: false,
    params: { hp: 10, int: 10, sen: 10, soc: 10, mnt: 10 },
    fatigue: 0, condition: 100, weight: 100,
    hiddenParams: {
        "【健康・バイオ】": { "血管年齢": 5, "免疫力": 100, "肺活量": 50, "炎症値": 0, "インスリン感度": 100, "糖分依存度": 0 },
        "【筋肉・部位別】": { "大胸筋": 10, "広背筋": 10, "上腕二頭筋": 5, "大腿四頭筋": 15, "体幹": 10, "柔軟性": 50 },
        "【学力・知能】": { "言語知能": 10, "論理数学": 10, "空間認識": 10, "ワーキングメモリ": 50, "経済意識": 0 },
        "【性格・深層】": { "開放性": 50, "誠実性": 50, "外向性": 50, "協調性": 50, "神経症傾向": 30, "徳（カルマ）": 100 },
        "【生活習慣】": { "肌の周期": 28, "清潔感": 80, "姿勢": 100, "貯金癖": 50 }
    }
};

const actionMaster = {
    study: [
        { label: 'ひらがな・カタカナ', sub: '知力・精神↑', main: { int: 1.2, mnt: 0.5 }, hidden: { "【学力・知能】.言語知能": 2, "【学力・知能】.ワーキングメモリ": 0.5 } },
        { label: 'かずのかぞえっこ', sub: '知力・精神↑', main: { int: 1.5 }, hidden: { "【学力・知能】.論理数学": 2.5, "【健康・バイオ】.インスリン感度": -0.1 } },
        { label: 'えいごのおうた', sub: '知力・精神↑', main: { int: 1, sen: 0.5 }, hidden: { "【学力・知能】.言語知能": 1.5, "【学力・知能】.ワーキングメモリ": 1 } }
    ],
    play: [
        { label: 'おそとをはしる', sub: '体力・社交↑', main: { hp: 2, soc: 0.5 }, hidden: { "【筋肉・部位別】.大腿四頭筋": 3, "【健康・バイオ】.肺活量": 2 } },
        { label: 'おえかき', sub: '感性・知力↑', main: { sen: 2, int: 0.5 }, hidden: { "【学力・知能】.空間認識": 2, "【性格・深層】.開放性": 0.5 } }
    ],
    rest: [
        { label: 'おひるね', sub: 'つかれを回復', main: {}, hidden: { "【健康・バイオ】.炎症値": -5, "【健康・バイオ】.免疫力": 1 } }
    ]
};

// ==========================================
// 2. コアロジック
// ==========================================

function startGame() {
    state.name = document.getElementById('input-name').value || "ななし";
    state.gender = document.getElementById('input-gender').value;
    document.getElementById('setup-overlay').style.display = "none";
    
    // 修正: ゲーム開始時に即座に描画を更新
    selectCat('study', document.getElementById('cat-study'));
    render();
}

function updateHidden(path, val) {
    let parts = path.split('.');
    if(state.hiddenParams[parts[0]] && state.hiddenParams[parts[0]][parts[1]] !== undefined) {
        state.hiddenParams[parts[0]][parts[1]] += val;
    }
}

function doAction(cat, idx) {
    const act = actionMaster[cat][idx];
    for(let k in act.main) state.params[k] += act.main[k];
    for(let p in act.hidden) updateHidden(p, act.hidden[p]);

    if(state.isPM) {
        state.day++; state.isPM = false;
        if(state.day > 30) { state.day = 1; state.month++; }
        if(state.month >= 12) { state.month = 0; state.age++; }
    } else {
        state.isPM = true;
    }
    render();
}

// ==========================================
// 3. 描画・UI更新
// ==========================================

function render() {
    // プロフィール更新
    document.getElementById('display-name').innerText = `${state.name} （${state.gender === 'boy' ? 'おとこのこ' : 'おんなのこ'}）`;
    
    const wd = ["日", "月", "火", "水", "木", "金", "土"][(state.day + 2) % 7];
    document.getElementById('display-date').innerText = `4月${state.day}日(${wd}) ${state.isPM ? 'PM' : 'AM'}`;
    document.getElementById('display-age').innerText = `${state.age}歳 ${state.month}ヶ月 1週 ${((state.day-1)%7)+1}日`;

    // ステータス更新
    for (let k in state.params) {
        let el = document.getElementById('st-' + k);
        if(el) el.innerText = Math.floor(state.params[k]);
    }

    drawVisual();
}

function drawVisual() {
    const canvas = document.getElementById('player-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // 修正: アップロード画像の名前に合わせる
    img.src = state.gender === 'boy' ? '画像1.png' : '画像2.png';

    img.onload = function() {
        // キャンバスのサイズを画像に合わせる
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 体質によるわずかな変形ロジック
        let scaleX = Math.min(1.2, Math.max(0.8, state.weight / 100));

        ctx.save();
        ctx.translate(canvas.width / 2, 0);
        ctx.scale(scaleX, 1.0);
        ctx.translate(-canvas.width / 2, 0);
        ctx.drawImage(img, 0, 0);
        ctx.restore();
    };
    
    // 読み込みに失敗した場合の予備
    img.onerror = function() {
        console.error("イラストの読み込みに失敗しました。ファイル名が '画像1.png' または '画像2.png' であることを確認してください。");
    };
}

function selectCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const list = document.getElementById('sub-action-list');
    list.innerHTML = actionMaster[cat].map((s, i) => `
        <button class="sub-btn" onclick="doAction('${cat}', ${i})">
            <b>${s.label}</b>
            <span>${s.sub}</span>
        </button>
    `).join('');
}

function toggleDebug(show) {
    const modal = document.getElementById('debug-modal');
    modal.style.display = show ? "flex" : "none";
    if(show) {
        let html = "";
        for(let sec in state.hiddenParams) {
            html += `<div class="debug-section"><h4>${sec}</h4>`;
            for(let p in state.hiddenParams[sec]) {
                html += `<div class="debug-row"><span>${p}</span><b>${state.hiddenParams[sec][p].toFixed(2)}</b></div>`;
            }
            html += `</div>`;
        }
        document.getElementById('debug-viewer').innerHTML = html;
    }
}
</script>
</body>
</html>
