<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レトロRPG風 歩行ゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: monospace;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background-color: #fff;
            border: 2px solid #000;
            image-rendering: pixelated; /* ドット絵をくっきり表示 */
            max-width: 100%;
            max-height: 70vh;
        }

        /* スマホ用方向パッド */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 200px;
            height: 200px;
            margin-top: 20px;
        }

        .control-btn {
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .control-btn:active {
            background-color: #666;
        }

        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }

    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="320" height="320"></canvas>

    <div id="controls">
        <button id="btnUp" class="control-btn">↑</button>
        <button id="btnLeft" class="control-btn">←</button>
        <button id="btnRight" class="control-btn">→</button>
        <button id="btnDown" class="control-btn">↓</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const SPRITE_URL = 'image_0.png'; // 生成されたスプライトシートを使用

    // ゲーム設定
    const SPRITE_SIZE = 64; // スプライトシート内の1コマのサイズ（生成画像に合わせる）
    const DISPLAY_SIZE = 64; // 画面上に描画するサイズ
    const MAP_SIZE = 320;
    const MOVE_SPEED = 2; // 1フレームの移動ピクセル
    const ANIM_SPEED = 10; // アニメーションの切り替え頻度（フレーム数）

    // スプライトシートのコマ位置定義 (行: 方向, 列: アニメーションコマ)
    // 0: 下, 1: 上, 2: 左, 3: 右
    // 0: 立ち止まる, 1: 左足, 2: 右足
    const SPRITE_MAP = {
        down:  { row: 0, cols: [0, 1, 0, 2] },
        up:    { row: 1, cols: [0, 1, 0, 2] },
        left:  { row: 2, cols: [0, 1, 0, 2] },
        right: { row: 3, cols: [0, 1, 0, 2] }
    };

    // プレイヤーオブジェクト
    let player = {
        x: (MAP_SIZE - DISPLAY_SIZE) / 2,
        y: (MAP_SIZE - DISPLAY_SIZE) / 2,
        direction: 'down',
        isMoving: false,
        animFrame: 0,
        animTimer: 0
    };

    // 入力状態
    let keys = {
        up: false, down: false, left: false, right: false
    };

    // スプライトシートの読み込み
    const spriteSheet = new Image();
    spriteSheet.src = SPRITE_URL;
    spriteSheet.onload = () => {
        // 画像がロードされたらゲームループを開始
        gameLoop();
    };

    // 入力イベント（PC）
    window.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp': case 'w': keys.up = true; break;
            case 'ArrowDown': case 's': keys.down = true; break;
            case 'ArrowLeft': case 'a': keys.left = true; break;
            case 'ArrowRight': case 'd': keys.right = true; break;
        }
    });

    window.addEventListener('keyup', (e) => {
        switch(e.key) {
            case 'ArrowUp': case 'w': keys.up = false; break;
            case 'ArrowDown': case 's': keys.down = false; break;
            case 'ArrowLeft': case 'a': keys.left = false; break;
            case 'ArrowRight': case 'd': keys.right = false; break;
        }
    });

    // 入力イベント（スマホ）
    const setupMobileControls = () => {
        const btns = [
            { id: 'btnUp', key: 'up' },
            { id: 'btnDown', key: 'down' },
            { id: 'btnLeft', key: 'left' },
            { id: 'btnRight', key: 'right' }
        ];

        btns.forEach(btn => {
            const element = document.getElementById(btn.id);
            element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[btn.key] = true;
            });
            element.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[btn.key] = false;
            });
        });
    };
    setupMobileControls();


    // プレイヤーの更新
    function updatePlayer() {
        player.isMoving = false;
        let nextX = player.x;
        let nextY = player.y;

        if (keys.up) {
            nextY -= MOVE_SPEED;
            player.direction = 'up';
            player.isMoving = true;
        } else if (keys.down) {
            nextY += MOVE_SPEED;
            player.direction = 'down';
            player.isMoving = true;
        }

        if (keys.left) {
            nextX -= MOVE_SPEED;
            player.direction = 'left';
            player.isMoving = true;
        } else if (keys.right) {
            nextX += MOVE_SPEED;
            player.direction = 'right';
            player.isMoving = true;
        }

        // 境界判定（画面外に出ないようにする）
        if (nextX >= 0 && nextX <= MAP_SIZE - DISPLAY_SIZE) {
            player.x = nextX;
        }
        if (nextY >= 0 && nextY <= MAP_SIZE - DISPLAY_SIZE) {
            player.y = nextY;
        }

        // アニメーションの更新
        if (player.isMoving) {
            player.animTimer++;
            if (player.animTimer >= ANIM_SPEED) {
                player.animTimer = 0;
                player.animFrame = (player.animFrame + 1) % SPRITE_MAP[player.direction].cols.length;
            }
        } else {
            player.animFrame = 0; // 立ち止まる
            player.animTimer = 0;
        }
    }

    // 描画
    function draw() {
        // キャンバスをクリア
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // プレイヤーを描画
        if (spriteSheet.complete) {
            const directionData = SPRITE_MAP[player.direction];
            const col = directionData.cols[player.animFrame];
            const row = directionData.row;

            // `drawImage`でスプライトシートから特定のコマを切り抜いて描画
            // sx, sy: スプライトシート内の開始座標
            // sw, sh: 切り抜くサイズ
            // dx, dy: 画面上の描画座標
            // dw, dh: 画面上の描画サイズ
            ctx.drawImage(
                spriteSheet,
                col * SPRITE_SIZE, row * SPRITE_SIZE, SPRITE_SIZE, SPRITE_SIZE, // ソース (sx, sy, sw, sh)
                player.x, player.y, DISPLAY_SIZE, DISPLAY_SIZE // ディスティネーション (dx, dy, dw, dh)
            );
        }

        // グリッド（簡易的な背景）
        ctx.strokeStyle = '#eee';
        for (let i = 0; i <= MAP_SIZE; i += DISPLAY_SIZE) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, MAP_SIZE);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(MAP_SIZE, i);
            ctx.stroke();
        }
    }

    // ゲームループ
    function gameLoop() {
        updatePlayer();
        draw();
        requestAnimationFrame(gameLoop);
    }

</script>

</body>
</html>
