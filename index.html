<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LIFE - Visual Engine</title>
    <style>
        :root {
            --primary: #FF9AA2;
            --primary-dark: #FF7B84;
            --secondary: #B5EAD7;
            --bg: #FFFDF9;
            --text: #5D514E;
            --card: #FFFFFF;
            --radius: 25px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 414px; height: 100%;
            background: var(--card); display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* ヘッダー & ステータス */
        #header { background: var(--primary); color: white; padding: 12px 20px; border-radius: 0 0 var(--radius) var(--radius); flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .date-badge { background: #FFEDEE; color: var(--primary-dark); padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }

        #status-bar {
            display: flex; justify-content: space-around;
            background: #FFF5F5; padding: 8px 5px; margin: 8px 15px;
            border-radius: 15px; border: 1px solid #FFEDEE; flex-shrink: 0;
        }
        .stat-item { flex: 1; text-align: center; font-size: 0.7em; }
        .stat-item b { display: block; font-size: 1.1em; color: var(--primary-dark); }

        /* メインエリア */
        #main-content { flex: 1; padding: 0 15px; overflow-y: auto; display: flex; flex-direction: column; }

        /* プロフィールエリア (画像+詳細) */
        #hero-profile-card {
            display: flex; background: #fff; border-radius: 20px;
            border: 2px solid #F1F2F6; margin-top: 10px; height: 160px; overflow: hidden; flex-shrink: 0;
        }
        #hero-visual-area {
            width: 40%; background: #FFF9F9; display: flex; justify-content: center; align-items: center;
            border-right: 1px solid #F1F2F6; padding: 5px;
        }
        /* キャンバスで描画 */
        #player-canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        #hero-detail-area { width: 60%; padding: 12px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
        .hero-name { font-weight: bold; font-size: 1em; color: var(--primary-dark); border-bottom: 2px solid #FFEDEE; padding-bottom: 2px; }
        .hero-sub-info { font-size: 0.75em; color: #887C79; }
        
        .gauge-container { width: 100%; }
        .gauge-label { font-size: 0.65em; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .gauge-bg { height: 6px; background: #EEE; border-radius: 3px; overflow: hidden; }
        .gauge-fill { height: 100%; transition: width 0.3s; }
        .fill-fatigue { background: #FFB347; }
        .fill-condition { background: #77DD77; }

        /* アクションエリア */
        .section-title { font-weight: bold; text-align: center; margin: 15px 0 10px; font-size: 0.9em; color: #A89B98; }
        #category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .cat-btn {
            padding: 10px 2px; border: 2px solid #F1F2F6; border-radius: 12px; background: white;
            cursor: pointer; font-weight: bold; color: #887C79; font-size: 0.75em; display: none;
        }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF5F5; }
        .cat-btn.visible { display: block; }

        #sub-action-list { display: flex; flex-direction: column; gap: 6px; padding-bottom: 20px; }
        .sub-btn { padding: 12px; border: 2px solid #F1F2F6; border-radius: 10px; background: #fff; text-align: left; cursor: pointer; }
        .sub-btn b { font-size: 0.85em; color: var(--text); }

        /* ナビゲーション */
        #nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #EEE; background: #fff; }
        .nav-item { padding: 12px; border: none; background: none; cursor: pointer; font-size: 0.8em; color: #9B918F; font-weight: bold; }

        /* ローディング & セットアップ */
        #loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #FFE6E6; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #setup-overlay { position: absolute; inset: 0; background: var(--primary); color: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-overlay">
        <h2>👶 THE LIFE</h2>
        <input type="text" id="input-name" style="width:80%; padding:12px; border-radius:10px; border:none; margin-bottom:10px;" placeholder="なまえ">
        <select id="input-gender" style="width:80%; padding:12px; border-radius:10px; border:none; margin-bottom:20px;">
            <option value="boy">おとこのこ 👦</option>
            <option value="girl">おんなのこ 👧</option>
        </select>
        <button onclick="startGame()" style="padding:12px 40px; border-radius:20px; border:none; background:white; color:var(--primary); font-weight:bold;">はじめる</button>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" style="margin-top:10px; font-size:0.8em;"></div>
    </div>

    <div id="header">
        <div class="header-top"><div id="display-date" class="date-badge">---</div></div>
    </div>

    <div id="status-bar">
        <div class="stat-item">体<b><span id="st-hp">0</span></b></div>
        <div class="stat-item">知<b><span id="st-int">0</span></b></div>
        <div class="stat-item">感<b><span id="st-sen">0</span></b></div>
        <div class="stat-item">社<b><span id="st-soc">0</span></b></div>
        <div class="stat-item">心<b><span id="st-mnt">0</span></b></div>
    </div>

    <div id="main-content">
        <div id="hero-profile-card">
            <div id="hero-visual-area">
                <canvas id="player-canvas"></canvas>
            </div>
            <div id="hero-detail-area">
                <div class="hero-name" id="hero-name-label">---</div>
                <div class="hero-sub-info" id="hero-age-label">---</div>
                <div class="gauge-container">
                    <div class="gauge-label"><span>体調</span><span id="label-cond">100%</span></div>
                    <div class="gauge-bg"><div id="fill-cond" class="gauge-fill fill-condition"></div></div>
                </div>
                <div class="gauge-container">
                    <div class="gauge-label"><span>疲労</span><span id="label-fatigue">0%</span></div>
                    <div class="gauge-bg"><div id="fill-fatigue" class="gauge-fill fill-fatigue"></div></div>
                </div>
            </div>
        </div>

        <div class="section-title">✨ きょうは なにをする？ ✨</div>
        <div id="category-grid">
            <button class="cat-btn" id="cat-study" onclick="selectCat('study', this)">📖 勉強</button>
            <button class="cat-btn" id="cat-exercise" onclick="selectCat('exercise', this)">🏃 運動</button>
            <button class="cat-btn" id="cat-play" onclick="selectCat('play', this)">🧸 遊び</button>
            <button class="cat-btn" id="cat-rest" onclick="selectCat('rest', this)">🛌 休む</button>
        </div>
        <div id="sub-action-list"></div>
    </div>

    <div id="nav-bar">
        <button class="nav-item">🗓️ 予定</button>
        <button class="nav-item">📖 記録</button>
        <button class="nav-item">⚙️ 設定</button>
    </div>
</div>

<script>
let state = {
    name: "", gender: "", age: 5, day: 1, isPM: false,
    params: { hp: 10, int: 10, sen: 10, soc: 10, mnt: 10, weight: 100 }, // 体重(標準100)を追加
    fatigue: 0, condition: 100,
    actions: {}, currentSeason: "seasonone"
};

const categoryConfig = {
    study: { min: 5, max: 25 },
    exercise: { min: 6, max: 80 },
    play: { min: 5, max: 15 },
    rest: { min: 5, max: 80 }
};

async function startGame() {
    state.name = document.getElementById('input-name').value || "ななし";
    state.gender = document.getElementById('input-gender').value;
    
    // JSONの読み込み (ダミーデータで代用または実環境でfetch)
    await loadActions();
    
    document.getElementById('setup-overlay').style.display = "none";
    refreshCategoryButtons();
    render();
}

async function loadActions() {
    try {
        const res = await fetch(`./date/${state.currentSeason}.json`);
        state.actions = await res.json();
    } catch (e) {
        // フォールバック用の簡易データ
        state.actions = { "study": [{"label":"おべんきょう","effect":{"int":2},"desc":"がんばった！"}] };
    }
}

function render() {
    for (let k in state.params) { if(k !== 'weight') document.getElementById('st-'+k).innerText = Math.floor(state.params[k]); }
    document.getElementById('hero-name-label').innerText = `${state.name} (${state.gender === 'boy' ? 'くん' : 'ちゃん'})`;
    document.getElementById('hero-age-label').innerText = `${state.age}歳 1週 ${((state.day-1)%7)+1}日目`;
    
    document.getElementById('fill-fatigue').style.width = state.fatigue + "%";
    document.getElementById('label-fatigue').innerText = state.fatigue + "%";
    document.getElementById('fill-cond').style.width = state.condition + "%";
    document.getElementById('label-cond').innerText = state.condition + "%";
    
    const wd = ["日", "月", "火", "水", "木", "金", "土"][(state.day + 2) % 7];
    document.getElementById('display-date').innerText = `4月${state.day}日(${wd}) ${state.isPM?'PM':'AM'}`;

    drawVisual(); // Canvas描画
}

function drawVisual() {
    const canvas = document.getElementById('player-canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // 性別と年齢層に合わせた画像パス
    img.src = `./images/prayer/${state.gender}_child.png`;

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 体重による変形 (横幅の伸縮) ---
        let scaleX = Math.min(1.4, Math.max(0.7, state.params.weight / 100));
        
        ctx.save();
        ctx.translate(canvas.width / 2, 0);
        ctx.scale(scaleX, 1.0);
        ctx.translate(-canvas.width / 2, 0);
        ctx.drawImage(img, 0, 0);

        // --- 体調による色調変化 (青ざめるフィルタ) ---
        let paleIntensity = (100 - state.condition) / 100;
        if (paleIntensity > 0) {
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = `rgba(130, 130, 255, ${paleIntensity * 0.4})`; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
        }
        ctx.restore();
    };
}

function refreshCategoryButtons() {
    for (const [key, range] of Object.entries(categoryConfig)) {
        const btn = document.getElementById(`cat-${key}`);
        if (state.age >= range.min && state.age <= range.max) btn.classList.add('visible');
    }
    const first = document.querySelector('.cat-btn.visible');
    if(first) selectCat(first.id.replace('cat-',''), first);
}

let currentCat = '';
function selectCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const list = document.getElementById('sub-action-list');
    const subActions = state.actions[cat] || [];
    list.innerHTML = subActions.map((s, i) => `<button class="sub-btn" onclick="doAction(${i})"><b>${s.label}</b></button>`).join('');
}

function doAction(idx) {
    const sub = state.actions[currentCat][idx];
    document.getElementById('loading-overlay').style.display = "flex";
    document.getElementById('loading-text').innerText = `${sub.label} 中...`;

    setTimeout(() => {
        for(let k in sub.effect) state.params[k] += sub.effect[k];
        
        // 疲労・体調の基本ロジック
        if(currentCat === 'rest') {
            state.fatigue = Math.max(0, state.fatigue - 30);
            state.condition = Math.min(100, state.condition + 10);
        } else {
            state.fatigue = Math.min(100, state.fatigue + 15);
            if(state.fatigue > 70) state.condition = Math.max(0, state.condition - 5);
        }

        if(state.isPM) { 
            state.day++; state.isPM = false; 
            state.fatigue = Math.max(0, state.fatigue - 20); // 日付変更で回復
        } else { state.isPM = true; }
        
        document.getElementById('loading-overlay').style.display = "none";
        render();
    }, 500);
}
</script>
</body>
</html>
