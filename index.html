<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>植物図鑑アプリ</title>
  <style>
    /* モバイル向けのデザイン設定 */
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    #app-container {
      max-width: 400px;
      margin: 0 auto;
      background-color: white;
      min-height: 100vh;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 20px;
      box-sizing: border-box;
    }
    /* 育成エリア */
    #pot-area {
      height: 250px;
      background-color: #eef7ee;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
    }
    #plant-image {
      max-width: 80%;
      max-height: 80%;
    }
    /* ボタン類 */
    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }
    #btn-water { background-color: #4CAF50; color: white; width: 100%; margin-bottom: 15px; }
    #btn-water:active { background-color: #45a049; }
    #btn-plant { background-color: #ff9800; color: white; width: 100%; }
    #btn-plant:disabled { background-color: #ccc; cursor: not-allowed; }
    /* 図鑑エリア */
    #encyclopedia {
      margin-top: 30px;
      border-top: 2px solid #eee;
      padding-top: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 10px;
    }
    .grid-item {
      aspect-ratio: 1 / 1;
      background-color: #ddd;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      overflow: hidden;
    }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    #message-box {
      min-height: 40px;
      color: #333;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="app-container">
  <h1>植物図鑑</h1>
  
  <div id="message-box">種を植えてみましょう！</div>

  <div id="pot-area">
    <img id="plant-image" src="seed.png" alt="植物" style="display: none;">
  </div>

  <button id="btn-water" style="display: none;">お水をあげる 💧</button>
  <button id="btn-plant">新しい種を植える 🌱</button>

  <div id="encyclopedia">
    <h3>図鑑</h3>
    <div class="grid" id="book-grid">
      </div>
  </div>
</div>

<script>
  // --------------------------------------------------
  // 1. JSONデータの準備（本来は別ファイルから読み込みますが、
  //    ローカル環境でエラーを出さずに動かすためここに定義します）
  // --------------------------------------------------
  
  const plant_master = [
    { id: 1, name: "朝のアサガオ", image: "plant_01.png", condition: { preferred_time: "morning", interval_type: "short" } },
    { id: 2, name: "サボテン", image: "plant_02.png", condition: { preferred_time: "any", interval_type: "long" } },
    { id: 3, name: "ツキミソウ", image: "plant_03.png", condition: { preferred_time: "night", interval_type: "regular" } }
    // ※今回はテスト用に3つだけ登録しています
  ];

  const initial_save_data = {
    player: { currency: 500 },
    active_pot: {
      is_occupied: false, // 現在育成中かどうか
      planted_at: null,
      last_watered_at: null,
      total_water_count: 0,
      time_stats: { morning: 0, day: 0, night: 0 }
    },
    encyclopedia: { unlocked_plant_ids: [] }
  };

  // --------------------------------------------------
  // 2. セーブデータの読み込みと初期化
  // --------------------------------------------------
  let saveData = JSON.parse(localStorage.getItem('plantAppSave'));
  if (!saveData) {
    saveData = initial_save_data;
  }

  // HTML要素の取得
  const elImage = document.getElementById('plant-image');
  const btnWater = document.getElementById('btn-water');
  const btnPlant = document.getElementById('btn-plant');
  const msgBox = document.getElementById('message-box');
  const bookGrid = document.getElementById('book-grid');

  const EVOLUTION_WATER_COUNT = 3; // テスト用：3回水やりで進化

  // --------------------------------------------------
  // 3. ゲームのメイン機能
  // --------------------------------------------------

  // 画面の更新処理
  function updateUI() {
    if (saveData.active_pot.is_occupied) {
      elImage.src = "seed.png";
      elImage.style.display = "block";
      btnWater.style.display = "block";
      
      // 育成中の植物がいる場合は、新しい種を植えられないように制御
      btnPlant.disabled = true; 
      btnPlant.innerText = "育成中です";
      
      msgBox.innerText = `水やり回数: ${saveData.active_pot.total_water_count} / ${EVOLUTION_WATER_COUNT}`;
    } else {
      elImage.style.display = "none";
      btnWater.style.display = "none";
      btnPlant.disabled = false;
      btnPlant.innerText = "新しい種を植える 🌱";
      msgBox.innerText = "鉢が空いています。種を植えましょう！";
    }
    drawEncyclopedia();
    localStorage.setItem('plantAppSave', JSON.stringify(saveData)); // セーブ
  }

  // 種を植える処理
  btnPlant.addEventListener('click', () => {
    if (saveData.active_pot.is_occupied) return; // 念のためのチェック

    saveData.active_pot = {
      is_occupied: true,
      planted_at: Date.now(),
      last_watered_at: Date.now(),
      total_water_count: 0,
      time_stats: { morning: 0, day: 0, night: 0 }
    };
    updateUI();
  });

  // 水をあげる処理
  btnWater.addEventListener('click', () => {
    const now = new Date();
    const currentHour = now.getHours();

    // 時間帯の判定
    if (currentHour >= 5 && currentHour < 10) saveData.active_pot.time_stats.morning++;
    else if (currentHour >= 18 || currentHour < 5) saveData.active_pot.time_stats.night++;
    else saveData.active_pot.time_stats.day++;

    saveData.active_pot.last_watered_at = Date.now();
    saveData.active_pot.total_water_count++;

    // 進化判定
    if (saveData.active_pot.total_water_count >= EVOLUTION_WATER_COUNT) {
      evolvePlant();
    } else {
      updateUI();
    }
  });

  // 進化処理
  function evolvePlant() {
    // どの時間帯に一番水をあげたか判定
    const stats = saveData.active_pot.time_stats;
    let maxTime = "day";
    let maxVal = stats.day;

    if (stats.morning > maxVal) { maxVal = stats.morning; maxTime = "morning"; }
    if (stats.night > maxVal) { maxVal = stats.night; maxTime = "night"; }

    // マスターデータから条件に合う植物を検索（今回は時間帯のみで簡易判定）
    let evolvedPlant = plant_master.find(p => p.condition.preferred_time === maxTime);
    
    // 見つからなかった場合のデフォルト（サボテンなど）
    if (!evolvedPlant) evolvedPlant = plant_master[1]; 

    // 図鑑に登録
    if (!saveData.encyclopedia.unlocked_plant_ids.includes(evolvedPlant.id)) {
      saveData.encyclopedia.unlocked_plant_ids.push(evolvedPlant.id);
    }

    // 画像を成長後のものに切り替え
    elImage.src = evolvedPlant.image;
    msgBox.innerText = `${evolvedPlant.name} に成長しました！`;
    
    // 鉢を空にする
    saveData.active_pot.is_occupied = false;
    
    // 少し待ってからUIをリセット
    setTimeout(() => {
      alert(`${evolvedPlant.name} を図鑑に登録しました！`);
      updateUI();
    }, 500);
  }

  // 図鑑の描画
  function drawEncyclopedia() {
    bookGrid.innerHTML = "";
    // 全10枠作成
    for (let i = 1; i <= 10; i++) {
      const div = document.createElement('div');
      div.className = 'grid-item';
      
      if (saveData.encyclopedia.unlocked_plant_ids.includes(i)) {
        // 解放済み
        const plantInfo = plant_master.find(p => p.id === i);
        if(plantInfo){
            div.innerHTML = `<img src="${plantInfo.image}" alt="${plantInfo.name}">`;
        } else {
            div.innerText = i; // マスター未定義の場合
        }
      } else {
        // 未解放
        div.innerText = "?";
      }
      bookGrid.appendChild(div);
    }
  }

  // 初回起動時の処理
  updateUI();

</script>
</body>
</html>
