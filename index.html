<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応 キャラクター移動</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            /* スワイプで画面がスクロールするのを防ぐ */
            touch-action: none; 
            overflow: hidden;
        }
        canvas {
            background-color: #7f8c8d;
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            image-rendering: pixelated;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 100%;
        }
        /* 十字キーのレイアウト（グリッドで配置） */
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
            margin-top: 30px;
        }
        .dpad-btn {
            background-color: #34495e;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: pointer;
            box-shadow: 0 5px 0 #1a252f;
        }
        /* ボタンを押したときの見た目 */
        .dpad-btn:active {
            box-shadow: 0 0 0 #1a252f;
            transform: translateY(5px);
            background-color: #2980b9;
        }
        /* 各ボタンの位置設定 */
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="320" height="320"></canvas>

    <div class="dpad">
        <div class="dpad-btn" id="btn-up">↑</div>
        <div class="dpad-btn" id="btn-left">←</div>
        <div class="dpad-btn" id="btn-right">→</div>
        <div class="dpad-btn" id="btn-down">↓</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'image.png';

        const COLS = 7;
        const ROWS = 4;
        let spriteWidth, spriteHeight;

        // アニメーション用変数
        let frameX = 0;
        let frameY = 0;
        let gameFrame = 0;
        const staggerFrames = 6; // アニメ速度

        // キャラクターの位置と移動設定
        let charX = 0;
        let charY = 0;
        const speed = 2.5; // 移動スピード
        const scale = 2;   // 描画サイズ（2倍）
        
        let isMoving = false;
        let dx = 0;
        let dy = 0;

        img.onload = () => {
            spriteWidth = img.width / COLS;
            spriteHeight = img.height / ROWS;
            
            // 初期位置をキャンバスの中央に設定
            charX = (canvas.width - spriteWidth * scale) / 2;
            charY = (canvas.height - spriteHeight * scale) / 2;
            
            animate();
        };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isMoving) {
                // 座標を更新して移動させる
                charX += dx * speed;
                charY += dy * speed;

                // 画面外に出ないように制限をかける
                charX = Math.max(0, Math.min(canvas.width - spriteWidth * scale, charX));
                charY = Math.max(0, Math.min(canvas.height - spriteHeight * scale, charY));

                // 動いている時だけアニメーションのコマを進める
                if (gameFrame % staggerFrames === 0) {
                    frameX = (frameX + 1) % COLS;
                }
                gameFrame++;
            } else {
                // 止まっている時は直立のコマ（一番左端）に戻す
                frameX = 0; 
            }

            // キャラクターを描画
            ctx.drawImage(
                img,
                frameX * spriteWidth, frameY * spriteHeight, spriteWidth, spriteHeight,
                charX, charY, spriteWidth * scale, spriteHeight * scale
            );

            requestAnimationFrame(animate);
        }

        // --- 移動の開始と停止 ---
        function startMove(dirX, dirY, row) {
            dx = dirX;
            dy = dirY;
            frameY = row;
            isMoving = true;
        }

        function stopMove() {
            isMoving = false;
        }

        // --- スマホ用ボタンのイベント設定 ---
        const setupButton = (id, dirX, dirY, row) => {
            const btn = document.getElementById(id);
            
            // タッチ操作（スマホ）
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); // 画面のスクロールなどを防ぐ
                startMove(dirX, dirY, row); 
            }, {passive: false});
            btn.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                stopMove(); 
            }, {passive: false});
            
            // マウス操作（PC）
            btn.addEventListener('mousedown', () => startMove(dirX, dirY, row));
            btn.addEventListener('mouseup', stopMove);
            btn.addEventListener('mouseleave', stopMove); // ボタンからカーソルが外れた時も止まるように
        };

        // 各ボタンに方向と画像行（向き）を割り当て
        setupButton('btn-up',    0, -1, 3); // 上 (4行目)
        setupButton('btn-down',  0,  1, 0); // 下 (1行目)
        setupButton('btn-left', -1,  0, 1); // 左 (2行目)
        setupButton('btn-right', 1,  0, 2); // 右 (3行目)

        // --- PCキーボード操作のイベント設定 ---
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':    startMove(0, -1, 3); break;
                case 'ArrowDown':  startMove(0,  1, 0); break;
                case 'ArrowLeft':  startMove(-1,  0, 1); break;
                case 'ArrowRight': startMove( 1,  0, 2); break;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                stopMove();
            }
        });
    </script>
</body>
</html>
