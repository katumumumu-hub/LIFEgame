      align-items: center;
      margin-bottom: 15px;
      border: 2px dashed #ccc;
      overflow: hidden; 
      padding: 0;

    #plant-image {
      width: 100%;
      height: 100%;
      object-fit: cover;

    /* ステータスパネル */
    .status-panel { background-color: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
    .status-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; font-size: 0.9rem; }

    button { padding: 15px; font-size: 16px; border: none; border-radius: 50px; cursor: pointer; margin: 5px 0; font-weight: bold; width: 100%; transition: transform 0.1s; }

    #btn-water { background-color: #2196F3; color: white; }
    #btn-plant { background-color: #4CAF50; color: white; }

      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
      position: relative;

    @keyframes newPop {

      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }

    .is-new {
      animation: newPop 1.5s infinite;
      border: 2px solid #FFD700;
      z-index: 2;
    }
    .is-new::after {
      content: "NEW!";
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #FF5722;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      white-space: nowrap;
    }

      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
    }

      background-color: #fff;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 300px;
      text-align: center;
      position: relative;
      animation: fadeIn 0.2s ease-out;

    #modal-img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 10px; }
    #modal-title { font-size: 1.2rem; margin: 0 0 10px 0; color: #333; }
    #modal-desc { font-size: 0.9rem; color: #666; text-align: left; line-height: 1.5; margin: 0; }

  </style>
