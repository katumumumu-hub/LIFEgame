<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LIFE - 5yo Edition</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --bg: #F7F9FC;
            --text: #2D3436;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            background: var(--card);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ヘッダーエリア */
        #header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .date-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        #calendar-event {
            font-size: 0.8em;
            margin-top: 8px;
            color: #FFF3E0;
            min-height: 1.2em;
        }

        /* ステータスバー */
        #status-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 15px;
            background: #FFF5F5;
            font-size: 0.7em;
            text-align: center;
        }

        .stat-item b { display: block; font-size: 1.2em; color: var(--primary); }

        /* メイン表示エリア */
        #main-display {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #situation-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #444;
        }

        #narration-box {
            font-size: 0.85em;
            color: #636e72;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--secondary);
            margin-bottom: 20px;
            display: none;
        }

        /* 選択肢ボタン */
        #choice-container {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .choice-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* プログレスバー */
        #progress-wrapper {
            height: 4px;
            background: #eee;
        }
        #progress-bar {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="header">
        <div class="date-badge" id="date-label">4月1日 AM</div>
        <div id="calendar-event">🎂 5歳の誕生日</div>
    </div>

    <div id="progress-wrapper"><div id="progress-bar"></div></div>

    <div id="status-grid">
        <div class="stat-item">体<b><span id="st-hp">10</span></b></div>
        <div class="stat-item">知<b><span id="st-int">10</span></b></div>
        <div class="stat-item">感<b><span id="st-sen">10</span></b></div>
        <div class="stat-item">社<b><span id="st-soc">10</span></b></div>
        <div class="stat-item">心<b><span id="st-mnt">10</span></b></div>
    </div>

    <div id="main-display">
        <div id="narration-box"></div>
        <div id="situation-text"></div>
    </div>

    <div id="choice-container">
        </div>
</div>

<script>
const GROWTH = 2.0;
let state = {
    day: 1,
    isPM: false,
    params: { hp: 10, int: 10, sen: 10, soc: 10, mnt: 10 },
    hidden: { diet: 0, bad_habit: 0 },
    lastNarration: ""
};

// カレンダーイベントの定義
const calendar = {
    1: "🎂 5歳の誕生日",
    5: "🌸 幼稚園の入園式",
    8: "🍙 お花見遠足",
    15: "🏥 定期検診",
    20: "🎨 お絵かき大会",
    29: "🌿 昭和の日（おでかけ）",
    30: "📊 1ヶ月の成長確認"
};

const scenarios = {
    morning: [
        { q: "朝ごはん、嫌いな野菜が入ってる...", opts: [
            { l: "目をつぶって食べる", e: {hp:2, mnt:2}, n: "克己心の芽生え。不快を乗り越える力が備わった。" },
            { l: "絶対食べないと泣き叫ぶ", e: {mnt:-1, hp:1}, n: "自己主張の爆発。世界が自分の思い通りにならないことを学ぶ。" }
        ]},
        { q: "幼稚園でお友達が泣いているよ。", opts: [
            { l: "「どうしたの？」と聞く", e: {soc:3, sen:1}, n: "共感性の萌芽。他者の痛みを認識し始めた。" },
            { l: "遠くから眺める", e: {int:2, sen:1}, n: "観察眼の鋭化。社会を俯瞰で捉える性質が育つ。" }
        ]}
    ],
    evening: [
        { q: "お風呂から上がったら、パパがタバコを吸ってる。", opts: [
            { l: "「いいにおい」と近づく", e: {sen:1, hp:-1}, h: {bad_habit:2}, n: "無垢な好奇心。有害なものへの心理的障壁が下がる。" },
            { l: "「くさい！」と逃げる", e: {mnt:1}, h: {bad_habit:-1}, n: "本能的な拒絶。自己防衛本能が正常に機能している。" }
        ]},
        { q: "寝る前の読み聞かせ、何がいい？", opts: [
            { l: "図鑑で動物を調べる", e: {int:3}, n: "知識の蓄積。論理的な世界への入り口に立った。" },
            { l: "冒険の絵本を読んでもらう", e: {sen:3}, n: "想像力の飛躍。見えない世界を旅する力が宿る。" }
        ]}
    ]
};

function update() {
    // UI Update
    document.getElementById('st-hp').innerText = Math.floor(state.params.hp);
    document.getElementById('st-int').innerText = Math.floor(state.params.int);
    document.getElementById('st-sen').innerText = Math.floor(state.params.sen);
    document.getElementById('st-soc').innerText = Math.floor(state.params.soc);
    document.getElementById('st-mnt').innerText = Math.floor(state.params.mnt);

    const time = state.isPM ? "PM" : "AM";
    document.getElementById('date-label').innerText = `4月${state.day}日 ${time}`;
    document.getElementById('calendar-event').innerText = calendar[state.day] || "";
    
    document.getElementById('progress-bar').style.width = `${(state.day / 30) * 100}%`;

    if (state.lastNarration) {
        const nBox = document.getElementById('narration-box');
        nBox.innerText = state.lastNarration;
        nBox.style.display = "block";
    }

    renderChoices();
}

function renderChoices() {
    const container = document.getElementById('choice-container');
    const sitText = document.getElementById('situation-text');
    container.innerHTML = "";

    const pool = state.isPM ? scenarios.evening : scenarios.morning;
    const scene = pool[Math.floor(Math.random() * pool.length)];

    sitText.innerText = scene.q;

    scene.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "choice-btn";
        btn.innerText = opt.l;
        btn.onclick = () => {
            // Apply effects
            for(let key in opt.e) state.params[key] += opt.e[key] * GROWTH;
            if(opt.h) for(let key in opt.h) state.hidden[key] += opt.h[key];
            
            state.lastNarration = opt.n;

            // Advance time
            if (state.isPM) { state.day++; state.isPM = false; }
            else { state.isPM = true; }

            if (state.day > 30) {
                alert("1ヶ月が終了しました！あなたの成長を確認しましょう。");
                location.reload();
            } else {
                update();
            }
        };
        container.appendChild(btn);
    });
}

// Start Game
update();
</script>
</body>
</html>
