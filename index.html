<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LIFE - Core</title>
    <style>
        :root {
            --primary: #FF9AA2;
            --primary-dark: #FF7B84;
            --secondary: #B5EAD7;
            --bg: #FFFDF9;
            --text: #5D514E;
            --card: #FFFFFF;
            --radius: 25px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 414px; height: 100%;
            background: var(--card); display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* ヘッダー */
        #header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 0 0 var(--radius) var(--radius); z-index: 10; flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .date-badge { background: #FFEDEE; color: var(--primary-dark); padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }
        .age-detail { font-size: 0.85em; margin-top: 5px; background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 20px; display: inline-block; }

        /* ステータス */
        #status-bar {
            display: flex; justify-content: space-around;
            background: #FFF5F5; padding: 10px 5px; margin: 8px 15px;
            border-radius: 15px; border: 1px solid #FFEDEE; flex-shrink: 0;
        }
        .stat-item { flex: 1; text-align: center; font-size: 0.7em; }
        .stat-item b { display: block; font-size: 1.2em; color: var(--primary-dark); }

        /* メインエリア */
        #main-content { flex: 1; padding: 0 20px; overflow-y: auto; display: flex; flex-direction: column; }

        /* 背景画像表示（外部画像管理用） */
        #bg-display {
            width: 100%; height: 160px; margin-top: 10px;
            border-radius: 15px; background-size: cover; background-position: center;
            border: 2px solid #F1F2F6; position: relative; flex-shrink: 0;
        }

        /* プレイヤー画像表示（外部画像管理用） */
        #player-img {
            width: 80px; height: 80px; position: absolute;
            bottom: 10px; left: 50%; transform: translateX(-50%);
            background-size: contain; background-repeat: no-repeat;
        }

        .section-title { font-weight: bold; text-align: center; margin: 15px 0; font-size: 1.1em; color: #887C79; }

        .category-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; flex-shrink: 0; }
        .cat-btn {
            padding: 12px 2px; border: 3px solid #F1F2F6; border-radius: 18px; background: white;
            cursor: pointer; font-weight: bold; color: #887C79; font-size: 0.85em;
        }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF5F5; }

        #sub-action-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .sub-btn { padding: 15px; border: 2px solid #F1F2F6; border-radius: 15px; background: #FDFEFE; text-align: left; cursor: pointer; }
        .sub-btn b { font-size: 0.95em; color: var(--text); }

        /* ナビ */
        #nav-bar { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #EEE; background: #fff; flex-shrink: 0; }
        .nav-item { padding: 15px; border: none; background: none; cursor: pointer; font-size: 0.9em; color: #9B918F; font-weight: bold; }

        /* モーダル */
        .modal { position: absolute; inset: 0; background: var(--bg); z-index: 50; display: none; flex-direction: column; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; flex-shrink: 0; }
        .modal-body { flex: 1; overflow-y: auto; padding-top: 10px; }
        .list-item { padding: 15px 10px; border-bottom: 1px solid #EEE; }

        #loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #FFE6E6; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #setup-overlay { position: absolute; inset: 0; background: var(--primary); color: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-overlay">
        <h1>✨ THE LIFE</h1>
        <input type="text" id="input-name" style="width:80%; padding:15px; border-radius:15px; border:none; margin-bottom:10px;" placeholder="なまえ" maxlength="10">
        <select id="input-gender" style="width:80%; padding:15px; border-radius:15px; border:none; margin-bottom:20px;">
            <option value="boy">おとこのこ 👦</option>
            <option value="girl">おんなのこ 👧</option>
        </select>
        <button onclick="startGame()" style="padding:15px 40px; border-radius:30px; border:none; background:white; color:var(--primary); font-weight:bold;">はじめる</button>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" style="margin-top:10px; font-weight:bold; color:var(--primary-dark);"></div>
    </div>

    <div id="header">
        <div class="header-top">
            <div class="user-info"><span id="display-name">---</span> (<span id="display-gender">---</span>)</div>
            <div class="date-badge" id="display-date">---</div>
        </div>
        <div class="age-detail" id="display-age">---</div>
    </div>

    <div id="status-bar">
        <div class="stat-item">体力<b><span id="st-hp">0</span></b></div>
        <div class="stat-item">知力<b><span id="st-int">0</span></b></div>
        <div class="stat-item">感性<b><span id="st-sen">0</span></b></div>
        <div class="stat-item">社交<b><span id="st-soc">0</span></b></div>
        <div class="stat-item">精神<b><span id="st-mnt">0</span></b></div>
    </div>

    <div id="main-content">
        <div id="bg-display">
            <div id="player-img"></div>
        </div>

        <div class="section-title">✨ きょうは なにをする？ ✨</div>
        <div class="category-grid">
            <button class="cat-btn active" id="btn-study" onclick="selectCat('study', this)">📖 べんきょう</button>
            <button class="cat-btn" id="btn-play" onclick="selectCat('play', this)">🧸 あそぶ</button>
            <button class="cat-btn" id="btn-rest" onclick="selectCat('rest', this)">🛌 やすむ</button>
        </div>
        <div id="sub-action-list"></div>
    </div>

    <div id="nav-bar">
        <button class="nav-item" onclick="showModal('calendar-modal')">🗓️ よてい</button>
        <button class="nav-item" onclick="showModal('log-modal')">📖 きろく</button>
        <button class="nav-item" onclick="showModal('help-modal')">⚙️ せってい</button>
    </div>

    <div id="calendar-modal" class="modal">
        <div class="modal-header"><h3>📅 よてい</h3><button onclick="closeModal()" style="border:none; background:none; font-size:1.5em;">×</button></div>
        <div class="modal-body" id="calendar-list"></div>
    </div>
    <div id="log-modal" class="modal">
        <div class="modal-header"><h3>📖 きろく</h3><button onclick="closeModal()" style="border:none; background:none; font-size:1.5em;">×</button></div>
        <div class="modal-body" id="log-list"></div>
    </div>
</div>

<script>
let state = {
    name: "", gender: "", age: 5, day: 1, isPM: false,
    params: { hp: 10, int: 10, sen: 10, soc: 10, mnt: 10 },
    logs: [],
    actions: {}, // JSONから読み込む
    events: {}   // JSONから読み込む
};

const weekDays = ["日", "月", "火", "水", "木", "金", "土"];

// --- データの読み込み ---
async function loadGameData(season) {
    try {
        const [actRes, evtRes] = await Promise.all([
            fetch(`./date/${season}.json`),
            fetch(`./event/${season}.json`)
        ]);
        state.actions = await actRes.json();
        state.events = await evtRes.json();
        console.log("Data loaded:", season);
    } catch (e) {
        console.error("Failed to load data:", e);
    }
}

async function startGame() {
    const n = document.getElementById('input-name').value;
    if(!n) return alert("なまえをいれてね！");
    
    state.name = n;
    state.gender = document.getElementById('input-gender').value;
    
    // Season1データの読み込み
    await loadGameData('seasonone');
    
    document.getElementById('display-name').innerText = state.name;
    document.getElementById('display-gender').innerText = state.gender === 'boy' ? 'おとこのこ' : 'おんなのこ';
    document.getElementById('setup-overlay').style.display = "none";
    
    updateVisuals();
    initCalendarUI();
    selectCat('study', document.getElementById('btn-study'));
    render();
}

// 季節や状況に合わせて画像を変更
function updateVisuals() {
    const bg = document.getElementById('bg-display');
    const player = document.getElementById('player-img');
    
    // 画像パスの例（images/haikei/5yo_spring.png などを用意）
    bg.style.backgroundImage = `url('./images/haikei/age5_room.png')`;
    player.style.backgroundImage = `url('./images/prayer/${state.gender}_5yo.png')`;
}

function render() {
    for (let k in state.params) document.getElementById('st-'+k).innerText = Math.floor(state.params[k]);
    const wd = weekDays[(state.day + 2) % 7];
    document.getElementById('display-date').innerText = `4月${state.day}日(${wd}) ${state.isPM?'PM':'AM'}`;
    document.getElementById('display-age').innerText = `${state.age}歳 0ヶ月 1週 ${((state.day-1)%7)+1}日`;
}

function selectCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const list = document.getElementById('sub-action-list');
    const subActions = state.actions[cat] || [];
    
    list.innerHTML = subActions.map((s, i) => `
        <button class="sub-btn" onclick="doAction(${i})">
            <b>${s.label}</b>
        </button>
    `).join('');
}

function doAction(idx) {
    const sub = state.actions[currentCat][idx];
    const overlay = document.getElementById('loading-overlay');
    document.getElementById('loading-text').innerText = `${sub.label} 中...`;
    overlay.style.display = "flex";

    setTimeout(() => {
        for(let k in sub.effect) state.params[k] += sub.effect[k];
        state.logs.unshift({ date: document.getElementById('display-date').innerText, act: sub.label, nar: sub.desc });
        
        if(state.isPM) { state.day++; state.isPM = false; } else { state.isPM = true; }
        
        overlay.style.display = "none";
        render();
        updateLogUI();
    }, 600);
}

function updateLogUI() {
    document.getElementById('log-list').innerHTML = state.logs.map(l => `
        <div class="list-item"><small>${l.date}</small><br><b>${l.act}</b><br><span style="font-size:0.85em; color:#666">${l.nar}</span></div>
    `).join('');
}

function initCalendarUI() {
    const list = document.getElementById('calendar-list');
    list.innerHTML = "";
    for(let d=1; d<=30; d++){
        const wd = weekDays[(d + 2) % 7];
        const ev = state.events.calendar[d] || "---";
        list.innerHTML += `<div class="list-item"><b>4/${d}(${wd})</b> - ${ev}</div>`;
    }
}

function showModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = "none"); }
</script>
</body>
</html>
