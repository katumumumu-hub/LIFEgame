<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>植物図鑑アプリ</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      text-align: center;
      background-color: #f0f2f0;
      margin: 0;
      padding: 0;
      color: #333;
    }
    #app-container {
      max-width: 400px;
      margin: 0 auto;
      background-color: white;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      padding: 20px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* スタート画面 */
    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('start.jpg');
      background-size: cover;
      background-position: center;
      background-color: #e8f5e9;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 60px;
      box-sizing: border-box;
      z-index: 50;
    }
    #btn-start {
      background-color: #689f38;
      color: white;
      width: 80%;
      max-width: 250px;
      font-size: 1.2rem;
      padding: 15px;
      border: 3px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    
    /* メイン画面エリア */
    #main-screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    /* 育成エリア */
    #pot-area {
      height: 220px;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      border: 2px dashed #ccc;
      overflow: hidden; 
      padding: 0;
    }
    #plant-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ステータスパネル */
    .status-panel { background-color: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
    .status-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; font-size: 0.9rem; }

    /* ボタン */
    button { padding: 15px; font-size: 16px; border: none; border-radius: 50px; cursor: pointer; margin: 5px 0; font-weight: bold; width: 100%; transition: transform 0.1s; }
    button:active { transform: scale(0.98); }
    #btn-water { background-color: #2196F3; color: white; }
    #btn-plant { background-color: #4CAF50; color: white; }
    #btn-plant:disabled { background-color: #ccc; }

    /* 図鑑エリア */
    #encyclopedia { margin-top: 30px; border-top: 2px solid #eee; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
    .grid-item {
      aspect-ratio: 1 / 1;
      background-color: #eee;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
      position: relative;
      cursor: pointer;
    }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }

    /* 図鑑の「NEW」演出 */
    @keyframes newPop {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
      50% { transform: scale(1.05); box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.7); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }
    .is-new {
      animation: newPop 1.5s infinite;
      border: 2px solid #FFD700;
      z-index: 2;
    }
    .is-new::after {
      content: "NEW!";
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #FF5722;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      white-space: nowrap;
    }

    /* モーダル (詳細画面) */
    #plant-modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background-color: #fff;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 300px;
      text-align: center;
      position: relative;
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; color: #999; cursor: pointer; }
    #modal-img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 10px; }
    
    #modal-img-placeholder {
      width: 150px;
      height: 150px;
      line-height: 150px;
      font-size: 60px;
      background-color: #eee;
      color: #999;
      border-radius: 10px;
      margin: 0 auto 10px;
      display: none;
    }

    #modal-title { font-size: 1.2rem; margin: 0 0 10px 0; color: #333; }
    #modal-desc { font-size: 0.9rem; color: #666; text-align: left; line-height: 1.5; margin: 0; white-space: pre-wrap; }

  </style>
</head>
<body>

<div id="app-container">
  
  <div id="start-screen">
    <button id="btn-start">ゲームスタート</button>
  </div>

  <div id="main-screen">
    <div id="pot-area">
      <img id="plant-image" src="tuti.jpg" alt="鉢" style="display: block;">
    </div>

    <div class="status-panel">
      <div class="status-item"><span>前回の水やり:</span><span id="last-watered-time">なし</span></div>
      <div class="status-item"><span>平均間隔:</span><span id="avg-interval-text">-</span></div>
      <div class="status-item"><span>成長具合:</span><span id="growth-status">-</span></div>
    </div>

    <button id="btn-water" style="display: none;">お水をあげる 💧</button>
    <button id="btn-plant">新しい種を植える 🌱</button>

    <div id="encyclopedia">
      <h3>図鑑</h3>
      <div class="grid" id="book-grid"></div>
    </div>
  </div>
</div>

<div id="plant-modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="" alt="">
    <div id="modal-img-placeholder">?</div>
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
  </div>
</div>

<script>
  // --- 新規追加: 音声ファイルの読み込み設定 ---
  const soundStart = new Audio('start.mp3');
  const bgmMain = new Audio('ikusei.mp3');
  bgmMain.loop = true; // BGMはループ再生
  
  const soundPlant = new Audio('ueru.mp3');
  const soundWater = new Audio('joro.mp3');
  const soundEvolve = new Audio('seityo.mp3');
  const soundNewEvolve = new Audio('newseityo.mp3');

  // 音声を最初から再生するヘルパー関数
  function playSound(audioObj) {
    audioObj.currentTime = 0;
    audioObj.play().catch(e => console.log("音声再生エラー:", e));
  }

  // --- 画面切り替えの処理 ---
  const startScreen = document.getElementById('start-screen');
  const mainScreen = document.getElementById('main-screen');
  const btnStart = document.getElementById('btn-start');

  btnStart.addEventListener('click', () => {
    playSound(soundStart); // スタートボタンの音
    bgmMain.play().catch(e => console.log("BGM再生エラー:", e)); // BGMの再生開始

    startScreen.style.display = 'none';
    mainScreen.style.display = 'block';
  });

  // --- データ定義 ---
  const plant_master = [
    { id: 1, name: "朝のアサガオ", image: "plant_01.png", description: "朝にたくさん水をもらって元気に育った花。早起きのご褒美。", hint: "「朝」を中心に、「こまめに」お世話をしてみよう。" },
    { id: 2, name: "サボテン", image: "plant_02.png", description: "水やりの間隔が長くても、たくましく育った乾燥に強い植物。", hint: "時間帯はバラバラでも大丈夫。「放置気味」で育ててみよう。" },
    { id: 3, name: "ツキミソウ", image: "plant_03.png", description: "夜遅い時間にひっそりと水を飲んで育った花。月明かりが似合う。", hint: "「夜」を中心に、「放置気味」に育ててみよう。" },
    { id: 4, name: "ヒマワリ", image: "plant_04.png", description: "日中にこまめに水をもらい、太陽に向かって真っすぐ育った花。", hint: "「昼」を中心に、「こまめに」お世話をしてみよう。" },
    { id: 5, name: "多肉植物", image: "plant_05.png", description: "日差しを浴びつつ、たまの水やりでのんびり育ったプニプニの葉。", hint: "「昼」を中心に、「放置気味」に育ててみよう。" },
    { id: 6, name: "ヨルガオ", image: "plant_06.png", description: "夜に何度も様子を見てもらい、暗闇で美しく花開いた。", hint: "「夜」を中心に、「こまめに」お世話をしてみよう。" },
    { id: 7, name: "ハーブ", image: "plant_07.png", description: "時間帯問わず、こまめに水をもらって香りが豊かに育った。", hint: "時間帯は気にせず、「こまめに」お世話をしてみよう。" },
    { id: 8, name: "苔玉", image: "plant_08.png", description: "不定期な水やりでも、じっくりと時間をかけて丸く成長した。", hint: "時間帯は気にせず、「かなり放置」してじっくり育ててみよう。" },
    { id: 9, name: "観葉植物", image: "plant_09.png", description: "毎朝のルーティンでたまに水をもらい、お部屋の空気をきれいにする。", hint: "「朝」を中心に、「放置気味」に育ててみよう。" },
    { id: 10, name: "光るキノコ", image: "plant_10.png", description: "深夜に特定の条件が重なったときだけ生える、不思議でレアなキノコ。", hint: "みんなが寝静まった「深夜」にお世話をしてみると…？" }
  ];

  // --- セーブデータの初期化 ---
  const SAVE_KEY = 'plantAppSave_v7'; 

  const defaultSaveData = {
    active_pot: { 
      is_occupied: false, 
      last_watered_at: null, 
      total_water_count: 0, 
      total_interval_ms: 0, 
      time_stats: { morning: 0, day: 0, night: 0, midnight: 0 } 
    },
    encyclopedia: { unlocked_plant_ids: [] }
  };

  let saveData = defaultSaveData;

  try {
    const loadedData = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (loadedData && loadedData.active_pot && loadedData.encyclopedia && Array.isArray(loadedData.encyclopedia.unlocked_plant_ids)) {
      saveData = loadedData;
    }
  } catch (e) {
    console.error("セーブデータの読み込みに失敗したため、初期化しました", e);
  }

  let newlyUnlockedId = null;

  const elLastWatered = document.getElementById('last-watered-time');
  const elAvgInterval = document.getElementById('avg-interval-text');
  const elGrowth = document.getElementById('growth-status');
  const elImage = document.getElementById('plant-image');
  const btnWater = document.getElementById('btn-water');
  const btnPlant = document.getElementById('btn-plant');
  const bookGrid = document.getElementById('book-grid');
  const modal = document.getElementById('plant-modal');

  const WATER_GOAL = 5;

  function formatTimestamp(ts) {
    if (!ts) return "なし";
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function getAverageIntervalMinutes() {
    const pot = saveData.active_pot;
    if (!pot || pot.total_water_count === 0) return 0;
    return Math.floor((pot.total_interval_ms / pot.total_water_count) / 1000 / 60) || 0;
  }

  function updateUI() {
    const pot = saveData.active_pot;
    elImage.style.display = "block";

    if (pot.is_occupied) {
      elImage.src = "tanehati.PNG";
      btnWater.style.display = "block";
      btnPlant.disabled = true;
      elLastWatered.innerText = formatTimestamp(pot.last_watered_at);
      elGrowth.innerText = `水やり ${pot.total_water_count} / ${WATER_GOAL}回`;
      
      const avgMins = getAverageIntervalMinutes();
      elAvgInterval.innerText = pot.total_water_count > 0 ? `約 ${avgMins} 分` : "計算中...";
    } else {
      elImage.src = "tuti.jpg";
      btnWater.style.display = "none";
      btnPlant.disabled = false;
      elLastWatered.innerText = "なし";
      elAvgInterval.innerText = "-";
      elGrowth.innerText = "種を待っています";
    }
    
    drawEncyclopedia();
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  }

  // 種を植える処理
  btnPlant.addEventListener('click', () => {
    playSound(soundPlant); // 種を植える音

    saveData.active_pot = { 
      is_occupied: true, 
      last_watered_at: Date.now(), 
      total_water_count: 0, 
      total_interval_ms: 0,
      time_stats: { morning: 0, day: 0, night: 0, midnight: 0 } 
    };
    updateUI();
  });

  // 水をあげる処理
  btnWater.addEventListener('click', () => {
    playSound(soundWater); // 水をあげる音

    elImage.src = "joro.PNG"; 
    const now = new Date();
    const hr = now.getHours();
    
    if (hr >= 5 && hr < 10) saveData.active_pot.time_stats.morning++;
    else if (hr >= 10 && hr < 18) saveData.active_pot.time_stats.day++;
    else if (hr >= 18 && hr <= 23) saveData.active_pot.time_stats.night++;
    else saveData.active_pot.time_stats.midnight++;

    if (saveData.active_pot.last_watered_at) {
      const diff = now.getTime() - saveData.active_pot.last_watered_at;
      saveData.active_pot.total_interval_ms += diff;
    }

    saveData.active_pot.last_watered_at = now.getTime();
    saveData.active_pot.total_water_count++;

    setTimeout(() => {
      if (saveData.active_pot.total_water_count >= WATER_GOAL) {
        evolve();
      } else {
        updateUI(); 
      }
    }, 1000);
  });

  function evolve() {
    const stats = saveData.active_pot.time_stats;
    const avgMins = getAverageIntervalMinutes();
    const totalWaters = saveData.active_pot.total_water_count;

    let maxTime = "none";
    let maxCount = 0;
    ["morning", "day", "night", "midnight"].forEach(t => {
      if (stats[t] > maxCount) { maxTime = t; maxCount = stats[t]; }
    });

    let timePreference = "any";
    if (maxCount >= totalWaters / 2) { 
      timePreference = maxTime;
    }

    let intervalType = "short";
    if (avgMins >= 1440) {
      intervalType = "very_long";
    } else if (avgMins >= 180) {
      intervalType = "long";
    }

    let resultId = null;
    if (timePreference === "midnight") {
      resultId = 10;
    } else if (timePreference === "any") {
      if (intervalType === "short") resultId = 7;
      else if (intervalType === "long") resultId = 2;
      else if (intervalType === "very_long") resultId = 8;
    } else if (timePreference === "morning") {
      resultId = (intervalType === "short") ? 1 : 9;
    } else if (timePreference === "day") {
      resultId = (intervalType === "short") ? 4 : 5;
    } else if (timePreference === "night") {
      resultId = (intervalType === "short") ? 6 : 3;
    }

    const plant = plant_master.find(p => p.id === resultId) || plant_master[0];

    if (!saveData.encyclopedia.unlocked_plant_ids) {
        saveData.encyclopedia.unlocked_plant_ids = [];
    }

    // --- 音の分岐処理 ---
    if (!saveData.encyclopedia.unlocked_plant_ids.includes(plant.id)) {
      playSound(soundNewEvolve); // 新規入手の音
      saveData.encyclopedia.unlocked_plant_ids.push(plant.id);
      newlyUnlockedId = plant.id;
    } else {
      playSound(soundEvolve); // 既存入手の音
      newlyUnlockedId = null;
    }

    elImage.src = plant.image;
    elGrowth.innerText = `${plant.name} になりました！`;
    saveData.active_pot.is_occupied = false;
    
    setTimeout(() => {
      alert(plant.name + " を図鑑に登録！");
      updateUI(); 
    }, 500);
  }

  function drawEncyclopedia() {
    bookGrid.innerHTML = "";
    
    const unlockedIds = saveData.encyclopedia?.unlocked_plant_ids || [];

    for (let i = 1; i <= 10; i++) {
      const div = document.createElement('div');
      div.className = 'grid-item';
      
      const isUnlocked = unlockedIds.includes(i);
      const p = plant_master.find(pm => pm.id === i) || { image: '', name: '不明', description: '', hint: '' };

      if (isUnlocked) {
        div.innerHTML = `<img src="${p.image}">`;
        div.classList.add('unlocked');
        if (i === newlyUnlockedId) {
          div.classList.add('is-new');
        }
        div.onclick = () => openModal(p, true);
      } else {
        div.innerText = "?";
        div.onclick = () => openModal(p, false);
      }
      bookGrid.appendChild(div);
    }
  }

  function openModal(plant, isUnlocked) {
    const modalImg = document.getElementById('modal-img');
    const placeholder = document.getElementById('modal-img-placeholder');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');

    if (isUnlocked) {
      modalImg.style.display = "inline-block";
      placeholder.style.display = "none";
      modalImg.src = plant.image;
      modalTitle.innerText = plant.name;
      modalDesc.innerText = plant.description;
    } else {
      modalImg.style.display = "none";
      placeholder.style.display = "block";
      modalTitle.innerText = "???";
      modalDesc.innerText = `【育成のヒント】\n${plant.hint}`;
    }

    modal.style.display = "flex";

    if (isUnlocked && plant.id === newlyUnlockedId) {
      newlyUnlockedId = null;
      drawEncyclopedia();
    }
  }

  function closeModal() {
    modal.style.display = "none";
  }

  window.onclick = function(event) {
    if (event.target === modal) {
      closeModal();
    }
  }

  updateUI();
</script>
</body>
</html>
